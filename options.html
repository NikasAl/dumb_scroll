<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dumb Scroll — настройки</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="page">
    <h1>Настройки</h1>
    <p class="lead">
      Укажи домены соцсетей (одна строка = один сайт). Для пути, например только лента LinkedIn:
      <code>linkedin.com/feed</code>
    </p>

    <label class="field">
      <span class="field-label">Сайты</span>
      <textarea id="domains" rows="14" spellcheck="false" placeholder="instagram.com"></textarea>
    </label>

    <label class="check">
      <input type="checkbox" id="requireFocus" />
      <span>Считать время только когда окно Chrome в фокусе</span>
    </label>

    <div class="actions">
      <button type="button" class="btn primary" id="save">Сохранить</button>
      <span class="saved" id="saved" hidden>Сохранено</span>
    </div>

    <section class="danger-zone">
      <h2>Данные</h2>
      <p class="muted">Сбросить всю накопленную статистику по дням.</p>
      <button type="button" class="btn danger" id="resetStats">Сбросить статистику</button>
    </section>
  </div>
  <script src="options.js"></script>
</body>
</html>
